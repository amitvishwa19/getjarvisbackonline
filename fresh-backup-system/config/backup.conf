# JARVIS Backup System Configuration

# What to backup (space-separated absolute paths)
BACKUP_PATHS="/home/ubuntu/.openclaw/workspace"

# Where to store the backup repository (local path)
BACKUP_REPO="/home/ubuntu/.openclaw/workspace/fresh-backup-system/backup-repo"

# Retention policy
RETENTION_DAYS=90
RETENTION_COUNT=365

# Compression
COMPRESS_LEVEL=6
COMPRESS_EXT="tar.gz"

# Encryption (optional, requires GPG)
ENCRYPT=false
ENCRYPTION_KEY_ID=""

# Notifications
NOTIFY_TELEGRAM=false
NOTIFY_SLACK=false
TELEGRAM_BOT_TOKEN=""
TELEGRAM_CHAT_ID=""
SLACK_WEBHOOK_URL=""

# Exclusions (one pattern per line; no trailing slashes)
EXCLUDE_PATTERNS="backup-repo
node_modules
test-site
*.log
*.tmp
.DS_Store
Thumbs.db"

# Logging
LOG_FILE="${HOME}/.openclaw/workspace/fresh-backup-system/logs/backup.log"
LOG_LEVEL="info"

# Hooks (optional; set to executable script path)
PRE_HOOK=""
POST_HOOK=""